# REST API Gateway route configuration
# Routes are defined here for container deployments.
# NiFi dynamic properties override values from this file.
restapi.data.path=/api/data
restapi.data.methods=GET,POST
restapi.data.tracking-mode=simple
restapi.data.success-outcome=data
restapi.admin.path=/api/admin
restapi.admin.methods=GET
restapi.admin.required-roles=ADMIN
restapi.admin.success-outcome=admin
restapi.disabled-test.path=/api/disabled
restapi.disabled-test.methods=GET
restapi.disabled-test.enabled=false
restapi.disabled-test.success-outcome=disabled-test
restapi.validated.path=/api/validated
restapi.validated.methods=POST
restapi.validated.schema=./conf/schemas/user-request-schema.json
restapi.validated.success-outcome=validated
restapi.inline-validated.path=/api/inline-validated
restapi.inline-validated.methods=POST
restapi.inline-validated.schema={"type":"object","required":["name"],"properties":{"name":{"type":"string"}}}
restapi.inline-validated.success-outcome=inline-validated
restapi.upload.path=/api/upload
restapi.upload.methods=POST
restapi.upload.tracking-mode=attachments
restapi.upload.attachments-min-count=1
restapi.upload.attachments-max-count=5
restapi.upload.attachments-timeout=60 sec
restapi.upload.success-outcome=upload
restapi.items.path=/api/items/{itemId}
restapi.items.methods=GET
restapi.items.success-outcome=items

# ── Sandbox routes ─────────────────────────────────────────────────────────
# These exercise documented gateway features (see doc/architecture/gateway.adoc
# "Auth-Mode Dispatch") that no other route covered. Every success-outcome below
# is auto-terminated on the RestApiGateway processor in flow.json.gz — an
# unconnected outcome relationship leaves the processor INVALID and the gateway
# never starts.

# auth-mode=none — anonymous access, no token required.
# Must not declare required-roles/required-scopes: the parser warns and the
# combination is contradictory.
restapi.sandbox-anonymous.path=/api/sandbox/anonymous
restapi.sandbox-anonymous.methods=GET
restapi.sandbox-anonymous.auth-mode=none
restapi.sandbox-anonymous.success-outcome=sandbox-anonymous

# required-scopes, allowed path — 'profile' is a Keycloak default client scope,
# so the standard test token (scope: "openid profile email") satisfies it and the
# request succeeds.
restapi.sandbox-scoped.path=/api/sandbox/scoped
restapi.sandbox-scoped.methods=GET
restapi.sandbox-scoped.required-scopes=profile
restapi.sandbox-scoped.success-outcome=sandbox-scoped

# required-scopes, denied path — 'sandbox:write' is granted to no client scope in
# the realm, so an otherwise-valid token is rejected with 403 insufficient_scope
# (RFC 6750 Section 3.1). A separate route is needed because Keycloak always
# includes its default scopes in the token: the same route cannot yield both a
# satisfying and a non-satisfying token without reworking the realm's client
# scopes, which would put the existing token claims at risk.
restapi.sandbox-scoped-denied.path=/api/sandbox/scoped-denied
restapi.sandbox-scoped-denied.methods=GET
restapi.sandbox-scoped-denied.required-scopes=sandbox:write
restapi.sandbox-scoped-denied.success-outcome=sandbox-scoped-denied

# Short attachment window so the expiry branch is observable inside an IT.
# The 'upload' route above uses 60 sec, which is far too long to wait out.
#
# KEEP IN SYNC with the "Expiration Duration" of the "Wait (sandbox-expiry)"
# processor in flow.json.gz, which is what actually expires the FlowFile. The
# gateway publishes this value as the rest.trace.attachments.timeout attribute,
# but NiFi's Wait processor declares "Expiration Duration" with EL scope "Not
# Supported", so Wait CANNOT read that attribute — the duration has to be static
# in the flow. This route therefore gets its own Wait processor rather than
# sharing the 30 sec one used by 'upload'.
restapi.sandbox-expiry.path=/api/sandbox/expiry
restapi.sandbox-expiry.methods=POST
restapi.sandbox-expiry.tracking-mode=attachments
restapi.sandbox-expiry.attachments-min-count=1
restapi.sandbox-expiry.attachments-max-count=5
restapi.sandbox-expiry.attachments-timeout=3 sec
restapi.sandbox-expiry.success-outcome=sandbox-expiry
