# REST API Gateway route configuration
restapi.data.path=/api/data
restapi.data.methods=GET,POST
restapi.data.success-outcome=data
restapi.admin.path=/api/admin
restapi.admin.methods=GET
restapi.admin.required-roles=ADMIN
restapi.admin.success-outcome=admin
restapi.disabled-test.path=/api/disabled
restapi.disabled-test.methods=GET
restapi.disabled-test.enabled=false
restapi.disabled-test.success-outcome=disabled-test
restapi.validated.path=/api/validated
restapi.validated.methods=POST
restapi.validated.schema=./conf/schemas/user-request-schema.json
restapi.validated.success-outcome=validated
restapi.inline-validated.path=/api/inline-validated
restapi.inline-validated.methods=POST
restapi.inline-validated.schema={"type":"object","required":["name"],"properties":{"name":{"type":"string"}}}
restapi.inline-validated.success-outcome=inline-validated
