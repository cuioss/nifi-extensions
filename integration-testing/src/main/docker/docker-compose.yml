  #     - NIFI_LOG_DIR=/opt/nifi/nifi-current/logs
  #     - NIFI_BOOTSTRAP_CONF=/opt/nifi/nifi-current/conf/bootstrap.conf
  #     - NIFI_CONF_DIR=/opt/nifi/nifi-current/conf
  #   volumes:
  #     - ../../../target/nifi-deploy:/opt/nifi/nifi-current/nar_extensions
  #     - ./nifi/conf:/opt/nifi/nifi-current/conf
  #     - ./certificates:/opt/nifi/nifi-current/conf/certs
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -k -f https://localhost:9095/nifi/ || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 60s
  #   networks:
  #     - nifi-keycloak-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.2.5
    command:
      - start-dev
      - --import-realm
      - --https-certificate-file=/opt/keycloak/certificates/localhost.crt
      - --https-certificate-key-file=/opt/keycloak/certificates/localhost.key
      - --https-port=8443
    ports:
      - "9085:8443"  # HTTPS (primary)
      - "9086:9000"  # Management port (health checks)
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
      - KC_DB=dev-mem
      - KC_LOG_LEVEL=INFO
      - KC_HOSTNAME_STRICT=false
      # HTTP enabled internally for management/health checks but not mapped to host port
      - KC_HTTPS_PORT=8443
      - KC_HOSTNAME=https://keycloak:8443
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
      - ./certificates:/opt/keycloak/certificates:ro
    healthcheck:
      # Readiness check via HTTP on port 8080 (management port 9000 uses HTTPS which bash TCP can't handle).
      # Checking the test realm endpoint verifies both server readiness and realm import completion.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/oauth_integration_tests HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && timeout 2 cat <&3 | grep -q 'oauth_integration_tests' && exec 3<&- && exec 3>&- && exit 0 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - nifi-keycloak-network
    restart: unless-stopped

networks:
  nifi-keycloak-network:
    driver: bridge
