  #     - NIFI_WEB_HTTP_PORT=
  #     - NIFI_WEB_HTTP_HOST=
  #     - NIFI_WEB_HTTPS_PORT=9095
  #     - NIFI_WEB_HTTPS_HOST=0.0.0.0
  #     - NIFI_REMOTE_INPUT_SECURE=true
  #     - NIFI_REMOTE_INPUT_HTTP_ENABLED=false
  #     - NIFI_CLUSTER_PROTOCOL_IS_SECURE=true
