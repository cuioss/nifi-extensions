<?xml version="1.0" encoding="UTF-8"?>
<!-- theme-handling: A (theme-neutral) -->
<!-- see pm-documents:ref-svg-diagrams/standards/theme-handling.md -->
<!-- source: doc/reference/request-tracking-architecture.adoc § Chained Requests -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"
     role="img" aria-labelledby="title desc"
     font-family="ui-sans-serif, -apple-system, system-ui, 'Segoe UI', sans-serif">
  <title id="title">Chained request correlation</title>
  <desc id="desc">A time-ordered exchange showing request correlation. The client posts a first request and receives traceId A, stored as ACCEPTED. It then posts a second request carrying X-Parent-Trace-Id A and receives traceId B, stored as ACCEPTED with parentTraceId A. A later status query for B returns its status along with the parent reference A.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-fill"/>
    </marker>
    <style>
      .col-header  { font-size: 13px; font-weight: 600; fill: #6e7681; text-anchor: middle; }
      .stroke      { stroke: #6e7681; stroke-width: 1.2; fill: none; }
      .sep         { stroke: #6e7681; stroke-width: 0.6; stroke-dasharray: 3 3; fill: none; }
      .arrow       { stroke: #6e7681; stroke-width: 1.5; fill: none; }
      .arrow-return{ stroke: #6e7681; stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; }
      .arrow-fill  { fill: #6e7681; }
      .arrow-lbl   { font-size: 11px; fill: #6e7681; text-anchor: middle; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
      .caption     { font-size: 12px; fill: #6e7681; text-anchor: middle; font-style: italic; }
    </style>
  </defs>

  <!-- Actors + lifelines -->
  <text x="140" y="30" class="col-header">Client</text>
  <rect class="stroke" x="85" y="42" width="110" height="34" rx="6" ry="6"/>
  <line class="sep" x1="140" y1="80" x2="140" y2="418"/>

  <text x="400" y="30" class="col-header">Gateway</text>
  <rect class="stroke" x="340" y="42" width="120" height="34" rx="6" ry="6"/>
  <line class="sep" x1="400" y1="80" x2="400" y2="418"/>

  <text x="660" y="30" class="col-header">DistributedMapCache</text>
  <rect class="stroke" x="575" y="42" width="170" height="34" rx="6" ry="6"/>
  <line class="sep" x1="660" y1="80" x2="660" y2="418"/>

  <!-- first request -->
  <line class="arrow" x1="140" y1="112" x2="398" y2="112" marker-end="url(#arrow)"/>
  <text x="269" y="104" class="arrow-lbl">POST /api/orders → A</text>
  <line class="arrow" x1="400" y1="144" x2="658" y2="144" marker-end="url(#arrow)"/>
  <text x="529" y="136" class="arrow-lbl">put(A, ACCEPTED)</text>
  <line class="arrow-return" x1="400" y1="176" x2="142" y2="176" marker-end="url(#arrow)"/>
  <text x="269" y="168" class="arrow-lbl">202 {traceId: A}</text>

  <!-- second (correlated) request -->
  <line class="arrow" x1="140" y1="228" x2="398" y2="228" marker-end="url(#arrow)"/>
  <text x="269" y="220" class="arrow-lbl">POST /api/payments (parent=A) → B</text>
  <line class="arrow" x1="400" y1="260" x2="658" y2="260" marker-end="url(#arrow)"/>
  <text x="529" y="252" class="arrow-lbl">put(B, ACCEPTED, parent=A)</text>
  <line class="arrow-return" x1="400" y1="292" x2="142" y2="292" marker-end="url(#arrow)"/>
  <text x="269" y="284" class="arrow-lbl">202 {traceId: B}</text>

  <!-- status query -->
  <line class="arrow" x1="140" y1="344" x2="398" y2="344" marker-end="url(#arrow)"/>
  <text x="269" y="336" class="arrow-lbl">GET /status/B</text>
  <line class="arrow" x1="400" y1="376" x2="658" y2="376" marker-end="url(#arrow)"/>
  <text x="529" y="368" class="arrow-lbl">get(B)</text>
  <line class="arrow-return" x1="400" y1="408" x2="142" y2="408" marker-end="url(#arrow)"/>
  <text x="269" y="400" class="arrow-lbl">200 {traceId: B, parentTraceId: A}</text>

  <!-- Footer -->
  <text x="400" y="462" class="caption">A and B are the traceIds of the correlated parent and child requests; B carries parentTraceId = A.</text>
</svg>
