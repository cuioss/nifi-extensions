<?xml version="1.0" encoding="UTF-8"?>
<!-- theme-handling: A (theme-neutral) -->
<!-- see pm-documents:ref-svg-diagrams/standards/theme-handling.md -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560"
     role="img" aria-labelledby="title desc"
     font-family="ui-sans-serif, -apple-system, system-ui, 'Segoe UI', sans-serif">
  <title id="title">Attachment tracking status lifecycle</title>
  <desc id="desc">A state machine for attachment-tracking requests. A POST to /api/upload with tracking-mode=attachments enters the COLLECTING_ATTACHMENTS state. When the minimum attachment count is met, the request moves to PROCESSED; alternatively an optional downstream flow moves it to PROCESSING. From PROCESSING the request can reach PROCESSED on success, REJECTED on rejection, ERROR on error, or RETRY on a temporary failure, and RETRY returns to PROCESSING.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-fill"/>
    </marker>
    <style>
      .state-lbl { font-size: 12.5px; fill: #6e7681; text-anchor: middle; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
      .lbl     { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .lbl-s   { font-size: 11px; fill: #6e7681; text-anchor: start; font-style: italic; }
      .stroke  { stroke: #6e7681; stroke-width: 1.2; fill: none; }
      .arrow   { stroke: #6e7681; stroke-width: 1.5; fill: none; }
      .arrow-fill { fill: #6e7681; }
      .dot     { fill: #6e7681; }
      .caption { font-size: 12px; fill: #6e7681; text-anchor: middle; font-style: italic; }
    </style>
  </defs>

  <!-- initial state -->
  <circle class="dot" cx="180" cy="60" r="6"/>
  <line class="arrow" x1="180" y1="66" x2="180" y2="86" marker-end="url(#arrow)"/>
  <text x="300" y="72" class="lbl-s">POST /api/upload  ·  tracking-mode=attachments</text>

  <!-- COLLECTING_ATTACHMENTS -->
  <rect class="stroke" x="50" y="88" width="260" height="50" rx="6" ry="6"/>
  <text x="180" y="118" class="state-lbl">COLLECTING_ATTACHMENTS</text>

  <!-- PROCESSING -->
  <rect class="stroke" x="360" y="264" width="180" height="50" rx="6" ry="6"/>
  <text x="450" y="294" class="state-lbl">PROCESSING</text>

  <!-- PROCESSED -->
  <rect class="stroke" x="80" y="452" width="200" height="50" rx="6" ry="6"/>
  <text x="180" y="482" class="state-lbl">PROCESSED</text>

  <!-- REJECTED -->
  <rect class="stroke" x="690" y="160" width="160" height="46" rx="6" ry="6"/>
  <text x="770" y="188" class="state-lbl">REJECTED</text>

  <!-- ERROR -->
  <rect class="stroke" x="690" y="266" width="160" height="46" rx="6" ry="6"/>
  <text x="770" y="294" class="state-lbl">ERROR</text>

  <!-- RETRY -->
  <rect class="stroke" x="690" y="372" width="160" height="46" rx="6" ry="6"/>
  <text x="770" y="400" class="state-lbl">RETRY</text>

  <!-- ===== Transitions ===== -->
  <!-- COLLECTING -> PROCESSED (min count met) -->
  <line class="arrow" x1="140" y1="138" x2="150" y2="450" marker-end="url(#arrow)"/>
  <text x="90" y="300" class="lbl">min count met</text>

  <!-- COLLECTING -> PROCESSING (downstream optional) -->
  <line class="arrow" x1="310" y1="126" x2="392" y2="262" marker-end="url(#arrow)"/>
  <text x="392" y="188" class="lbl">downstream (optional)</text>

  <!-- PROCESSING -> PROCESSED (downstream success) -->
  <line class="arrow" x1="368" y1="314" x2="270" y2="450" marker-end="url(#arrow)"/>
  <text x="248" y="392" class="lbl">success</text>

  <!-- PROCESSING -> REJECTED (rejection) -->
  <line class="arrow" x1="540" y1="278" x2="688" y2="196" marker-end="url(#arrow)"/>
  <text x="616" y="228" class="lbl">rejection</text>

  <!-- PROCESSING -> ERROR (error) -->
  <line class="arrow" x1="540" y1="289" x2="688" y2="289" marker-end="url(#arrow)"/>
  <text x="614" y="281" class="lbl">error</text>

  <!-- PROCESSING -> RETRY (temporary failure) -->
  <line class="arrow" x1="536" y1="306" x2="688" y2="388" marker-end="url(#arrow)"/>
  <text x="606" y="360" class="lbl">temporary failure</text>

  <!-- RETRY -> PROCESSING (retry) -->
  <line class="arrow" x1="700" y1="404" x2="544" y2="308" marker-end="url(#arrow)"/>
  <text x="628" y="392" class="lbl">retry</text>

  <!-- ===== Footer ===== -->
  <text x="450" y="540" class="caption">The status is authored by the AttachmentsEndpointHandler and surfaced on the request-status endpoint.</text>
</svg>
