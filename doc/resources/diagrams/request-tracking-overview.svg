<?xml version="1.0" encoding="UTF-8"?>
<!-- theme-handling: A (theme-neutral) -->
<!-- see pm-documents:ref-svg-diagrams/standards/theme-handling.md -->
<!-- source: doc/reference/request-tracking-architecture.adoc § Status Lifecycle -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 640"
     role="img" aria-labelledby="title desc"
     font-family="ui-sans-serif, -apple-system, system-ui, 'Segoe UI', sans-serif">
  <title id="title">Request tracking status lifecycle</title>
  <desc id="desc">A state machine for tracked requests. A simple-mode POST enters ACCEPTED; an attachments-mode POST enters COLLECTING_ATTACHMENTS. ACCEPTED moves to PROCESSING when the downstream flow starts. COLLECTING_ATTACHMENTS moves to PROCESSED when the minimum attachment count is met, or to PROCESSING for an optional downstream flow. From PROCESSING a request reaches PROCESSED on success, REJECTED on a validation error, RETRY on a transient error (which returns to PROCESSING), or ERROR on an unrecoverable error. PROCESSED, REJECTED, and ERROR are terminal.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-fill"/>
    </marker>
    <style>
      .state-lbl { font-size: 12.5px; fill: #6e7681; text-anchor: middle; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
      .lbl     { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .stroke  { stroke: #6e7681; stroke-width: 1.2; fill: none; }
      .arrow   { stroke: #6e7681; stroke-width: 1.5; fill: none; }
      .arrow-fill { fill: #6e7681; }
      .dot     { fill: #6e7681; }
      .term    { stroke: #6e7681; stroke-width: 1.2; fill: none; }
      .caption { font-size: 12px; fill: #6e7681; text-anchor: middle; font-style: italic; }
    </style>
  </defs>

  <!-- entries -->
  <circle class="dot" cx="200" cy="52" r="6"/>
  <line class="arrow" x1="200" y1="58" x2="200" y2="72" marker-end="url(#arrow)"/>
  <text x="330" y="46" class="lbl">POST · tracking-mode=simple</text>

  <circle class="dot" cx="700" cy="52" r="6"/>
  <line class="arrow" x1="700" y1="58" x2="700" y2="72" marker-end="url(#arrow)"/>
  <text x="700" y="46" class="lbl">POST · tracking-mode=attachments</text>

  <!-- ACCEPTED -->
  <rect class="stroke" x="110" y="74" width="180" height="46" rx="6" ry="6"/>
  <text x="200" y="102" class="state-lbl">ACCEPTED</text>

  <!-- COLLECTING_ATTACHMENTS -->
  <rect class="stroke" x="560" y="74" width="280" height="46" rx="6" ry="6"/>
  <text x="700" y="102" class="state-lbl">COLLECTING_ATTACHMENTS</text>

  <!-- PROCESSING -->
  <rect class="stroke" x="360" y="250" width="180" height="52" rx="6" ry="6"/>
  <text x="450" y="281" class="state-lbl">PROCESSING</text>

  <!-- PROCESSED -->
  <rect class="stroke" x="360" y="470" width="180" height="48" rx="6" ry="6"/>
  <text x="450" y="499" class="state-lbl">PROCESSED</text>

  <!-- REJECTED -->
  <rect class="stroke" x="780" y="210" width="170" height="44" rx="6" ry="6"/>
  <text x="865" y="238" class="state-lbl">REJECTED</text>
  <!-- RETRY -->
  <rect class="stroke" x="780" y="322" width="170" height="44" rx="6" ry="6"/>
  <text x="865" y="350" class="state-lbl">RETRY</text>
  <!-- ERROR -->
  <rect class="stroke" x="780" y="434" width="170" height="44" rx="6" ry="6"/>
  <text x="865" y="462" class="state-lbl">ERROR</text>

  <!-- terminals -->
  <circle class="term" cx="450" cy="560" r="10"/>
  <circle class="dot" cx="450" cy="560" r="4.5"/>
  <circle class="term" cx="978" cy="232" r="10"/>
  <circle class="dot" cx="978" cy="232" r="4.5"/>
  <circle class="term" cx="978" cy="456" r="10"/>
  <circle class="dot" cx="978" cy="456" r="4.5"/>

  <!-- ===== transitions ===== -->
  <!-- ACCEPTED -> PROCESSING -->
  <line class="arrow" x1="210" y1="120" x2="362" y2="256" marker-end="url(#arrow)"/>
  <text x="264" y="176" class="lbl">downstream starts</text>
  <!-- COLLECTING -> PROCESSING -->
  <line class="arrow" x1="620" y1="120" x2="524" y2="248" marker-end="url(#arrow)"/>
  <text x="606" y="182" class="lbl">downstream (optional)</text>
  <!-- COLLECTING -> PROCESSED -->
  <line class="arrow" x1="700" y1="120" x2="542" y2="474" marker-end="url(#arrow)"/>
  <text x="678" y="164" class="lbl">min count met</text>
  <!-- PROCESSING -> PROCESSED -->
  <line class="arrow" x1="450" y1="302" x2="450" y2="468" marker-end="url(#arrow)"/>
  <text x="486" y="388" class="lbl">success</text>
  <!-- PROCESSING -> REJECTED -->
  <line class="arrow" x1="540" y1="262" x2="778" y2="230" marker-end="url(#arrow)"/>
  <text x="620" y="238" class="lbl">validation error</text>
  <!-- PROCESSING -> RETRY -->
  <line class="arrow" x1="540" y1="282" x2="778" y2="332" marker-end="url(#arrow)"/>
  <text x="632" y="282" class="lbl">transient error</text>
  <!-- RETRY -> PROCESSING -->
  <line class="arrow" x1="780" y1="356" x2="542" y2="296" marker-end="url(#arrow)"/>
  <text x="652" y="348" class="lbl">retry</text>
  <!-- PROCESSING -> ERROR -->
  <line class="arrow" x1="534" y1="300" x2="778" y2="452" marker-end="url(#arrow)"/>
  <text x="694" y="396" class="lbl">unrecoverable error</text>

  <!-- terminal transitions -->
  <line class="arrow" x1="450" y1="518" x2="450" y2="548" marker-end="url(#arrow)"/>
  <line class="arrow" x1="950" y1="232" x2="966" y2="232" marker-end="url(#arrow)"/>
  <line class="arrow" x1="950" y1="456" x2="966" y2="456" marker-end="url(#arrow)"/>

  <!-- Footer -->
  <text x="510" y="612" class="caption">Attachment routes start directly in COLLECTING_ATTACHMENTS and never pass through ACCEPTED.</text>
</svg>
