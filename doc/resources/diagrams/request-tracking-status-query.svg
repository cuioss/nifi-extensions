<?xml version="1.0" encoding="UTF-8"?>
<!-- theme-handling: A (theme-neutral) -->
<!-- see pm-documents:ref-svg-diagrams/standards/theme-handling.md -->
<!-- source: doc/reference/request-tracking-architecture.adoc § Status Query Flow -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440"
     role="img" aria-labelledby="title desc"
     font-family="ui-sans-serif, -apple-system, system-ui, 'Segoe UI', sans-serif">
  <title id="title">Status query flow</title>
  <desc id="desc">A time-ordered exchange for a status query. The client sends GET /status/{traceId}; the gateway authenticates and validates the UUID, then reads the entry from the distributed map cache. If the entry is found the gateway returns 200 OK with the current status; if not found it returns 404 as an RFC 9457 problem detail.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-fill"/>
    </marker>
    <style>
      .col-header  { font-size: 13px; font-weight: 600; fill: #6e7681; text-anchor: middle; }
      .stroke      { stroke: #6e7681; stroke-width: 1.2; fill: none; }
      .sep         { stroke: #6e7681; stroke-width: 0.6; stroke-dasharray: 3 3; fill: none; }
      .frame       { stroke: #6e7681; stroke-width: 0.8; fill: none; }
      .arrow       { stroke: #6e7681; stroke-width: 1.5; fill: none; }
      .arrow-return{ stroke: #6e7681; stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; }
      .arrow-fill  { fill: #6e7681; }
      .arrow-lbl   { font-size: 11px; fill: #6e7681; text-anchor: middle; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
      .guard       { font-size: 11px; fill: #6e7681; text-anchor: start; font-style: italic; }
      .frame-lbl   { font-size: 11px; fill: #6e7681; text-anchor: start; font-weight: 600; }
      .note        { font-size: 10.5px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .caption     { font-size: 12px; fill: #6e7681; text-anchor: middle; font-style: italic; }
    </style>
  </defs>

  <!-- Actors + lifelines -->
  <text x="140" y="30" class="col-header">Client</text>
  <rect class="stroke" x="85" y="42" width="110" height="34" rx="6" ry="6"/>
  <line class="sep" x1="140" y1="80" x2="140" y2="360"/>

  <text x="400" y="30" class="col-header">Gateway</text>
  <rect class="stroke" x="340" y="42" width="120" height="34" rx="6" ry="6"/>
  <line class="sep" x1="400" y1="80" x2="400" y2="360"/>

  <text x="660" y="30" class="col-header">DistributedMapCache</text>
  <rect class="stroke" x="575" y="42" width="170" height="34" rx="6" ry="6"/>
  <line class="sep" x1="660" y1="80" x2="660" y2="360"/>

  <!-- messages -->
  <line class="arrow" x1="140" y1="118" x2="398" y2="118" marker-end="url(#arrow)"/>
  <text x="269" y="110" class="arrow-lbl">GET /status/{traceId}</text>

  <rect class="sep" x="298" y="134" width="204" height="26" rx="4" ry="4"/>
  <text x="400" y="151" class="note">authenticate · validate UUID</text>

  <line class="arrow" x1="400" y1="188" x2="658" y2="188" marker-end="url(#arrow)"/>
  <text x="529" y="180" class="arrow-lbl">get(traceId)</text>

  <!-- alt fragment -->
  <rect class="frame" x="100" y="212" width="600" height="132" rx="4" ry="4"/>
  <text x="112" y="228" class="frame-lbl">alt</text>
  <text x="150" y="228" class="guard">[ entry found ]</text>

  <line class="arrow-return" x1="400" y1="258" x2="142" y2="258" marker-end="url(#arrow)"/>
  <text x="271" y="250" class="arrow-lbl">200 OK {traceId, status: PROCESSING}</text>

  <line class="sep" x1="100" y1="284" x2="700" y2="284"/>
  <text x="150" y="300" class="guard">[ not found ]</text>

  <line class="arrow-return" x1="400" y1="326" x2="142" y2="326" marker-end="url(#arrow)"/>
  <text x="271" y="318" class="arrow-lbl">404 Not Found (RFC 9457)</text>

  <!-- Footer -->
  <text x="400" y="400" class="caption">Status entries are prefix-matched from the cache and returned as JSON or an RFC 9457 problem detail.</text>
</svg>
