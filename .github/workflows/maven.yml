# Configuration is read from .github/project.yml - no inputs needed!
name: Maven Build

on:
  # Every push builds (quality + Sonar branch analysis); every PR builds (Sonar
  # pull-request analysis). The reusable workflow's gate skips a push build when an
  # open PR already covers that commit, so there is no push/PR duplicate — no caller
  # `if:` is needed. The gate reads open PRs, hence `pull-requests: read` below.
  # IMPORTANT — branch-name constraint for contributors:
  # Only branches matching the prefixes below trigger the push build (the
  # required `build` status check). A branch on any OTHER prefix (e.g.
  # `refactor/*`, `docs/*`, `test/*`) silently gets NO build check, which then
  # BLOCKS auto-merge because the required check never reports. Always name
  # feature branches with one of: `feature/*`, `fix/*`, `chore/*`, `release/*`
  # (or `dependabot/**`, `main`). Add any new prefix here before using it.
  push:
    branches: [main, "feature/*", "fix/*", "chore/*", "release/*", "dependabot/**"]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    uses: cuioss/cuioss-organization/.github/workflows/reusable-maven-build.yml@ef13a4cc2866081c878187fdc3243243644bb19e # v0.10.1
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      OSS_SONATYPE_USERNAME: ${{ secrets.OSS_SONATYPE_USERNAME }}
      OSS_SONATYPE_PASSWORD: ${{ secrets.OSS_SONATYPE_PASSWORD }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
