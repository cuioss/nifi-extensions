name: End-to-End Tests

on:
  # main builds on push; every other branch builds via its pull_request to main.
  # Non-main branches are not in the push list, so there is one run per PR update and
  # no push/PR duplicate — superseding the former fork-only `if:` guard.
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-tests:
    uses: cuioss/cuioss-organization/.github/workflows/reusable-maven-integration-tests.yml@d130b317a9122014f76d760452aba05c4ea567e3 # v0.11.0
    with:
      report-name: e-2-e-playwright
      maven-args-input: verify -Pintegration-tests -pl e-2-e-playwright -am
      install-playwright: true
      npm-cache: true
      timeout-minutes: 30
      reports-folder: |
        e-2-e-playwright/target/test-results
      report-logs: |
        e-2-e-playwright/target/keycloak-container.log
        e-2-e-playwright/target/nifi-container.log
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
