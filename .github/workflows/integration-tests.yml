name: Integration Tests

on:
  # main builds on push; every other branch builds via its pull_request to main.
  # Non-main branches are not in the push list, so there is one run per PR update and
  # no push/PR duplicate — superseding the former fork-only `if:` guard.
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration-tests:
    uses: cuioss/cuioss-organization/.github/workflows/reusable-maven-integration-tests.yml@a7368d92f50df26ff8e495b9bd8ecee4cf9a8471 # v0.6.7
    with:
      report-name: integration-testing
      maven-args-input: verify -Pintegration-tests -pl integration-testing -am
      timeout-minutes: 15
      reports-folder: integration-testing/target/failsafe-reports
      report-logs: |
        integration-testing/target/keycloak-container.log
        integration-testing/target/nifi-container.log
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
